<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>doc_tools</title>
	<script type="text/javascript" src="resources/js/plugins.js"></script>
    <script type="text/javascript" src="resources/js/plugins-ui.js"></script>
    <link rel="stylesheet" href="resources/css/plugins.css">
	<script src="scripts/tools.js"></script>
	<script src="vendor/number_to_words/bundle.js"></script>
	<style>
		html, body {
			min-height: 100% !important;
			height: 100%;
			overflow-y:hidden;
            overflow-x: hidden;
		}

		.noselect {
			-khtml-user-select: none;
			user-select: none;
			-moz-user-select: none;
			-webkit-user-select: none;
		}

		td {
			background: transparent;
			border:0;
			padding:10px;
		}

		.celllabel {
			text-align: center;
			font-size: 12px;
			color: #444444;
			font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
		}

		.selection-stats {
			box-sizing: border-box;
			margin: 16px 20px 4px;
			padding: 12px 14px;
			border: 1px solid #d9d9d9;
			border-radius: 10px;
			background: #f7f7f7;
			font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
			color: #222222;
			text-align: left;
		}

		.selection-stats__title {
			margin-bottom: 8px;
			font-size: 12px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: .04em;
			color: #666666;
		}

		.selection-stats__row {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			gap: 12px;
			margin-top: 4px;
			font-size: 13px;
		}

		.selection-stats__row:first-of-type {
			margin-top: 0;
		}

		.selection-stats__label {
			color: #666666;
		}

		.selection-stats__value {
			font-weight: 700;
		}

		.selection-stats__hint {
			margin-top: 8px;
			font-size: 12px;
			color: #777777;
		}

		img:hover {
			opacity: .5;
			cursor: pointer;
		}
		
		img.disabled{
			opacity: .2;
			filter: grayscale(1);
			cursor: not-allowed;
		}
		
	</style>
</head>
<body style="width: 100%;height: 100%; margin: 0;">
	<div id="scrollable-container-id" style="position: relative; height: 100%; overflow: hidden">
		<div id="selection-stats" class="selection-stats">
			<div class="selection-stats__title">Статистика выделения</div>
			<div class="selection-stats__row">
				<span class="selection-stats__label">Символов</span>
				<span class="selection-stats__value" id="selection-char-count">0</span>
			</div>
			<div class="selection-stats__row">
				<span class="selection-stats__label">Без пробелов</span>
				<span class="selection-stats__value" id="selection-char-no-spaces-count">0</span>
			</div>
			<div class="selection-stats__row">
				<span class="selection-stats__label">Слов</span>
				<span class="selection-stats__value" id="selection-word-count">0</span>
			</div>
			<div class="selection-stats__hint" id="selection-stats-hint">Выделите текст, и статистика обновится автоматически.</div>
		</div>
		<table id="main" style="border:0; margin:0; padding:0; border-spacing:0; text-align: center;">
		</table>
	</div>
</body>
</html>
